<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>University Materials Explorer</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				margin: 20px;
				background-color: #f4f4f9;
			}
			h1 {
				color: #333;
			}
			#file-explorer {
				max-width: 800px;
				margin: 0 auto;
			}
			.folder,
			.file {
				padding: 10px;
				margin: 5px 0;
				border-radius: 5px;
				cursor: pointer;
			}
			.folder {
				background-color: #e0f7fa;
				font-weight: bold;
			}
			.file {
				background-color: #fff;
				border: 1px solid #ddd;
			}
			.file a {
				text-decoration: none;
				color: #0066cc;
			}
			.file a:hover {
				text-decoration: underline;
			}
			.file-type {
				color: #666;
				font-size: 0.9em;
				margin-left: 10px;
			}
		</style>
	</head>
	<body>
		<h1>University Materials</h1>
		<div id="file-explorer"></div>

		<script src="files.js"></script>
		<script>
			function loadFiles() {
				try {
					const explorer = document.getElementById("file-explorer");
					explorer.innerHTML = "";

					// Recursive function to display files and folders
					function displayItems(
						items,
						prefix = "",
						container = explorer
					) {
						items.forEach((item) => {
							const div = document.createElement("div");
							if (item.type === "folder") {
								div.className = "folder";
								div.textContent = `📁 ${item.name}`;
								div.onclick = () => {
									const subDiv = div.nextSibling;
									subDiv.style.display =
										subDiv.style.display === "none"
											? "block"
											: "none";
								};
								container.appendChild(div);
								const subDiv = document.createElement("div");
								subDiv.style.paddingLeft = "20px";
								subDiv.style.display = "none";
								container.appendChild(subDiv);
								displayItems(
									item.contents,
									`${prefix}${item.name}/`,
									subDiv
								);
							} else {
								div.className = "file";
								const fileExt = item.name
									.split(".")
									.pop()
									.toLowerCase();
								const fileType = getFileType(fileExt);
								div.innerHTML = `📄 <a href="iad/${prefix}${item.name}" target="_blank">${item.name}</a> <span class="file-type">(${fileType})</span>`;
								container.appendChild(div);
							}
						});
					}

					// Map file extensions to display names
					function getFileType(ext) {
						const types = {
							pdf: "PDF Document",
							mp4: "Video",
							txt: "Text File",
							docx: "Word Document",
							jpg: "Image",
							png: "Image",
							jpeg: "Image",
							// Add more as needed
						};
						return types[ext] || "File";
					}

					// Assume fileList is defined in files.js
					displayItems(fileList);
				} catch (error) {
					console.error("Error loading files:", error);
					document.getElementById("file-explorer").innerHTML =
						"<p>Error loading files. Please try again later.</p>";
				}
			}

			// Load files when page loads
			window.onload = loadFiles;
		</script>
	</body>
</html>
